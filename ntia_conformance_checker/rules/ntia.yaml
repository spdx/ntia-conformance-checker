#
# Rules derived from
# The Minimum Elements For a Software Bill of Materials (SBOM),
# National Telecommunications and Information Administration, 2021.
# Source: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom

spec:
  id: ntia
  title: 2021 NTIA SBOM Minimum Elements
  uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
  taxonomies:
    category: ntia-minimum-elements
    clause: ntia-clauses

categories:
  - id: data-fields
    code: DF
    title: Data Fields
    description: Baseline information about each component that should be tracked.
  - id: automation-support
    code: AS
    title: Automation Support
    description: Support for automation including machine-readable formats.
  - id: practices-and-processes
    code: PP
    title: Practices and Processes
    description: Operational practices for SBOM creation, exchange, and consumption.

# NTIA is a flat spec: it defines no maturity tiers, so no `maturity_levels`
# block.  Every rule sits at the implicit baseline (maturity 0 -> SARIF error).

rules:
  # ---- Data Fields (component-level) -----------------------------------

  - number: 1
    slug: ntia-component-supplier-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Supplier Name
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: supplier
    element_description: component supplier
    competency_question: All component suppliers provided?
    warning: An SBOM component should have a supplier name.
    probe:
      name: require_component_attribute
      params: { attribute: supplier }
    json_key: componentSuppliers

  - number: 2
    slug: ntia-component-name-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Component Name
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: name
    element_description: component name
    competency_question: All component names provided?
    warning: An SBOM component should have a name.
    probe:
      name: require_component_attribute
      params: { attribute: name }
    json_key: componentNames

  - number: 3
    slug: ntia-component-version-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Version of the Component
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: version
    element_description: component version
    competency_question: All component versions provided?
    warning: An SBOM component should have a version.
    probe:
      name: require_component_attribute
      params: { attribute: version }
    json_key: componentVersions

  - number: 4
    slug: ntia-component-identifier-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Other Unique Identifiers
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: unique_identifier
    element_description: component identifier
    competency_question: All component identifiers provided?
    warning: An SBOM component should have a unique identifier.
    probe:
      name: require_component_attribute
      params: { attribute: unique_identifier }
    json_key: componentIdentifiers

  # ---- Data Fields (document-level) ------------------------------------

  - number: 5
    slug: ntia-dependency-relationships-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Dependency Relationship
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: dependency_relationship
    element_description: dependency relationships
    competency_question: Dependency relationships provided?
    warning: An SBOM should declare dependency relationships.
    probe:
      name: require_document_attribute
      params: { attribute: dependency_relationship }
    json_key: dependencyRelationshipsProvided

  - number: 6
    slug: ntia-sbom-author-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Author of SBOM Data
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: author
    element_description: SBOM author
    competency_question: SBOM author name provided?
    warning: An SBOM should have an author name.
    probe:
      name: require_document_attribute
      params: { attribute: author }
    json_key: authorNameProvided

  - number: 7
    slug: ntia-sbom-timestamp-missing
    spec_category: data-fields
    spec_clause_number: IV
    spec_clause_name: Data Fields -- Timestamp
    spec_clause_uri: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom
    element_id: timestamp
    element_description: SBOM creation timestamp
    competency_question: SBOM creation timestamp provided?
    warning: An SBOM should have a creation timestamp.
    probe:
      name: require_document_attribute
      params: { attribute: timestamp }
    json_key: timestampProvided
